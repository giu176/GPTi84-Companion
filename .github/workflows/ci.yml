name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/file_relay/requirements.txt
      - run: python -m pip install -r tools/file_relay/requirements.txt
      - run: python -m unittest discover -s tools/file_relay -p "test_*.py" -v

  arduino:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
      - run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli compile --fqbn arduino:avr:uno arduino/pc_bt_bridge
          arduino-cli compile --fqbn arduino:avr:uno arduino/hc05_config
          arduino-cli compile --fqbn arduino:avr:uno arduino/hc06_config

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/wrapper-validation@v4
      - run: chmod +x gradlew
      - run: ./gradlew testDebugUnitTest lintDebug assembleDebug
